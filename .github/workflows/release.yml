name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  build:
    name: Build (${{ matrix.platform }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package (${{ matrix.platform }})
        run: pnpm build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # CI 无签名证书，禁止 electron-builder 自动搜索 macOS keychain，避免构建失败
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: power-chat-${{ matrix.platform }}
          path: |
            electron/release/*.dmg
            electron/release/*.zip
            electron/release/*.exe
            electron/release/*.AppImage
            electron/release/*.deb
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read package version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List collected artifacts
        run: ls -lah artifacts

      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          # run_number 后缀确保同一版本号多次触发时 tag 唯一，不会覆盖已发布的 Release
          tag_name: v${{ steps.pkg.outputs.version }}-build.${{ github.run_number }}
          name: 思考画布 v${{ steps.pkg.outputs.version }} (build ${{ github.run_number }})
          prerelease: true
          generate_release_notes: true
          files: artifacts/**/*
